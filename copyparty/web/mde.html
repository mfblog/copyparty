<!DOCTYPE html>
<html lang="en" id="ht_mde">

<head>
	<meta charset="utf-8">
	<title>📝 {{ title }}</title>
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=0.7">
	<meta name="theme-color" content="#{{ tcolor }}">
	<link rel="stylesheet" href="{{ r }}/.cpr/w/ui.css?_={{ ts }}">
	<link rel="stylesheet" href="{{ r }}/.cpr/w/mde.css?_={{ ts }}">
	<link rel="stylesheet" href="{{ r }}/.cpr/w/deps/mini-fa.css?_={{ ts }}">
	<link rel="stylesheet" href="{{ r }}/.cpr/w/deps/easymde.css?_={{ ts }}">
{{ html_head }}
</head>

<body>
	<div id="mw">
		<div id="mn"></div>
		<div id="ml">
			<div style="text-align:center;margin:5em 0">
				<div style="font-size:2em;margin:1em 0">Loading</div>
				if you're still reading this, check that javascript is allowed
			</div>
		</div>
		<div id="m">
			<textarea id="mt" style="display:none" autocomplete="off">{{ md }}</textarea>
		</div>
	</div>
	<a href="#" id="repl">π</a>
	<script nonce="{{ js_nonce }}">

var SR = "{{ r }}",
	JS_NONCE = "{{ js_nonce }}",
	CGV1 = {{ cgv1 }},
	last_modified = {{ lastmod }},
	dfavico = "{{ favico }}";

var lightswitch = (function () {
	var l = window.localStorage,
		drk = (l && l.light) != 1,
		f = function (e) {
if (e) drk = !drk;
document.documentElement.className = drk? "z":"y";
try { l.light = drk? 0:1; } catch (ex) { }
		};
	f();
	return f;
})();

	</script>
	<script nonce="{{ js_nonce }}" src="{{ r }}/.cpr/w/util.js?_={{ ts }}"></script>
	<script nonce="{{ js_nonce }}" src="{{ r }}/.cpr/w/deps/marked.js?_={{ ts }}"></script>
	<script nonce="{{ js_nonce }}" src="{{ r }}/.cpr/w/deps/easymde.js?_={{ ts }}"></script>
	<script nonce="{{ js_nonce }}" src="{{ r }}/.cpr/w/mde.js?_={{ ts }}"></script>
	{%- if js %}
	<script nonce="{{ js_nonce }}" src="{{ js }}_={{ ts }}"></script>
	{%- endif %}
	<script nonce="{{ js_nonce }}">
		Date.now();function jsldp(a,b){2!=window[a]&&alert("FATAL ERROR: cannot load "+b+".js due to unreliable network or broken reverse-proxy; try CTRL-SHIFT-R")}
		jsldp("J_UTL","util");
		jsldp("J_MDE","mde");
	</script>
</body></html>
